<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>할 일 목록</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-light bg-light border-bottom">
    <div class="container">
        <span class="navbar-brand">Task Manager</span>
        <div class="d-flex align-items-center gap-3">
            <span class="text-secondary" th:text="${username}"></span>
            <form th:action="@{/logout}" method="post" class="mb-0">
                <button type="submit" class="btn btn-outline-secondary btn-sm">로그아웃</button>
            </form>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h5>내 할 일</h5>
        <a th:href="@{/tasks/new}" class="btn btn-primary btn-sm">+ 새 할 일</a>
    </div>

    <table class="table">
        <thead>
        <tr>
            <th>완료</th>
            <th>제목</th>
            <th>설명</th>
            <th>작성일</th>
            <th>수정</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="task : ${tasks}">
            <td>
                <form th:action="@{/tasks/{id}/complete(id=${task.id})}" method="post">
                    <input type="checkbox" th:checked="${task.completed}" onchange="this.form.submit()">
                </form>
            </td>
            <td th:text="${task.title}"></td>
            <td th:text="${task.description}"></td>
            <td th:text="${task.createdAt}"></td>
            <td><a th:href="@{/tasks/{id}/edit(id=${task.id})}" class="btn btn-outline-secondary btn-sm">수정</a></td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
