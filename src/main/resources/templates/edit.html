<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>할 일 수정</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-light bg-light border-bottom">
    <div class="container">
        <a th:href="@{/tasks}" class="navbar-brand">Task Manager</a>
        <form th:action="@{/logout}" method="post" class="mb-0">
            <button type="submit" class="btn btn-outline-secondary btn-sm">로그아웃</button>
        </form>
    </div>
</nav>

<div class="container mt-4" style="max-width: 600px;">
    <h5 class="mb-3">할 일 수정</h5>
    <form th:action="@{/tasks/{id}/edit(id=${task.id})}" method="post" th:object="${taskUpdateDTO}">
        <div class="mb-3">
            <label class="form-label">제목</label>
            <input type="text" name="title" class="form-control" th:value="${task.title}">
            <div th:if="${#fields.hasErrors('title')}" th:errors="*{title}" class="text-danger" style="font-size: 13px; margin-top: 4px;"></div>
        </div>
        <div class="mb-3">
            <label class="form-label">설명</label>
            <textarea name="description" class="form-control" rows="3" th:text="${task.description}"></textarea>
        </div>
        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">수정 완료</button>
            <a th:href="@{/tasks}" class="btn btn-outline-secondary">취소</a>
        </div>
    </form>

    <form th:action="@{/tasks/{id}/delete(id=${task.id})}" method="post" class="mt-3">
        <button type="submit" class="btn btn-outline-danger">삭제</button>
    </form>
</div>
</body>
</html>
