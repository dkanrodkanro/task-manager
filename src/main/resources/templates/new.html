<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>할 일 등록</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-light bg-light border-bottom">
    <div class="container">
        <a th:href="@{/tasks}" class="navbar-brand">Task Manager</a>
        <form th:action="@{/logout}" method="post" class="mb-0">
            <button type="submit" class="btn btn-outline-secondary btn-sm">로그아웃</button>
        </form>
    </div>
</nav>

<div class="container mt-4" style="max-width: 600px;">
    <h5 class="mb-3">새 할 일 등록</h5>
    <form th:action="@{/tasks/new}" method="post">
        <div class="mb-3">
            <label class="form-label">제목</label>
            <input type="text" name="title" class="form-control" placeholder="할 일 제목을 입력하세요">
        </div>
        <div class="mb-3">
            <label class="form-label">설명</label>
            <textarea name="description" class="form-control" rows="3" placeholder="상세 내용을 입력하세요"></textarea>
        </div>
        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">등록</button>
            <a th:href="@{/tasks}" class="btn btn-outline-secondary">취소</a>
        </div>
    </form>
</div>
</body>
</html>
